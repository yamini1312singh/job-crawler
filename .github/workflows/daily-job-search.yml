name: Daily Job Search

on:
  workflow_dispatch:

  schedule:
    - cron: '30 4 * * *'

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Script
        run: python scripts/fetch_jobs.py
